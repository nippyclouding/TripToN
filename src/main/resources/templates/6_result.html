<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>전체 고민 목록</title>
    <link rel="stylesheet" href="/css/6_result.css">
    <link rel="stylesheet" href="/css/shared.css">
</head>
<body>
    <!-- 배경 이미지 -->
    <div class="background"></div>

    <div th:replace="~{fragments/sidebar :: symbol-logo}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 잠수함 이미지 -->
        <div class="submarine-container">
            <img src="/image/6_resultPage/submarine.png" alt="submarine" class="submarine" id="submarine">
        </div>

        <!-- 가방 이미지들 (숨겨진 상태로 시작) -->
        <div class="luggage-circle" id="luggageCircle">
            <div th:each="concern : ${concernResponseDto}"
                 class="luggage-item"
                 th:data-lid="${concern.concernId}"
                 th:data-username="${concern.memberNickName}">
                <img th:src="|/image/sharedImage/item${concern.luggageType.ordinal() + 1}.png|"
                     th:alt="${concern.luggageType}"
                     class="luggage-img"/>
                <div class="username-label" th:text="${concern.memberNickName}"></div>
            </div>
        </div>

        <!-- 페이지네이션 화살표 -->
        <div class="pagination-controls" id="paginationControls">
            <button class="page-arrow prev-arrow" id="prevPage">
                <span>&lt;</span>
            </button>
            <div class="page-info" id="pageInfo">
                <span id="currentPage" th:text="${currentPage + 1}">1</span> / <span id="totalPages" th:text="${totalPages}">1</span>
            </div>
            <button class="page-arrow next-arrow" id="nextPage">
                <span>&gt;</span>
            </button>
        </div>

    </div>

    <script src="/js/6_result.js"></script>
    <script src="/js/shared.js"></script>
</body>
</html>
