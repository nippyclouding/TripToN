<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('MY PAGE', '/css/mypage.css')}"></th:block>
</head>
<body class="mypage-background">

    <th:block th:replace="~{fragments/layout :: app-chrome}"></th:block>

    <div class="mypage-wrap">

        <!-- 유저 정보 -->
        <div class="mypage-header">
            <h1 class="mypage-nickname" id="mypage-nickname"></h1>
            <span class="mypage-email" id="mypage-email"></span>
        </div>

        <!-- 2x2 그리드 -->
        <div class="mypage-grid">

            <!-- 내 고민 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">MY CONCERNS</div>
                <div class="mypage-list" id="concerns-list"></div>
                <div class="mypage-pagination" id="concerns-pagination"></div>
            </div>

            <!-- 내 댓글 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">MY COMMENTS</div>
                <div class="mypage-list" id="comments-list"></div>
                <div class="mypage-pagination" id="comments-pagination"></div>
            </div>

            <!-- 좋아요한 고민 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">LIKED CONCERNS</div>
                <div class="mypage-list" id="concern-likes-list"></div>
                <div class="mypage-pagination" id="concern-likes-pagination"></div>
            </div>

            <!-- 좋아요한 댓글 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">LIKED COMMENTS</div>
                <div class="mypage-list" id="comment-likes-list"></div>
                <div class="mypage-pagination" id="comment-likes-pagination"></div>
            </div>

        </div>
    </div>

    <th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>
    <script src="/js/mypage.js" defer></script>

</body>
</html>
