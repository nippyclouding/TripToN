<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('MY PAGE', '/css/mypage.css')}"></th:block>
</head>
<body class="mypage-background">

    <th:block th:replace="~{fragments/layout :: app-chrome}"></th:block>

    <div class="mypage-wrap">

        <!-- 유저 정보 -->
        <div class="mypage-header">
            <h1 class="mypage-nickname" th:text="${myPage.memberNickName}"></h1>
            <span class="mypage-email" th:text="${myPage.memberEmail}"></span>
        </div>

        <!-- 2x2 그리드 -->
        <div class="mypage-grid">

            <!-- 내 고민 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">MY CONCERNS</div>
                <div class="mypage-list" th:if="${not #lists.isEmpty(myPage.concernDtos)}">
                    <a th:each="item : ${myPage.concernDtos}"
                       th:href="@{/concern/{id}(id=${item.concernId})}"
                       class="mypage-item">
                        <span class="item-title" th:text="${item.concernTitle}"></span>
                        <span class="item-meta" th:text="${#temporals.format(item.createdAt, 'yy.MM.dd')}"></span>
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(myPage.concernDtos)}" class="mypage-empty">작성한 고민이 없습니다</div>
                <th:block th:replace="~{fragments/layout :: mypage-pager(
                    ${concernPage},
                    ${myPage.concernTotalPages},
                    @{/myPage(concernPage=${concernPage - 1},commentPage=${commentPage},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage})},
                    @{/myPage(concernPage=${concernPage + 1},commentPage=${commentPage},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage})}
                )}"></th:block>
            </div>

            <!-- 내 댓글 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">MY COMMENTS</div>
                <div class="mypage-list" th:if="${not #lists.isEmpty(myPage.commentDtos)}">
                    <div th:each="item : ${myPage.commentDtos}" class="mypage-item">
                        <span class="item-title" th:text="${item.commentContent}"></span>
                        <span class="item-meta" th:text="${#temporals.format(item.createdAt, 'yy.MM.dd')}"></span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(myPage.commentDtos)}" class="mypage-empty">작성한 댓글이 없습니다</div>
                <th:block th:replace="~{fragments/layout :: mypage-pager(
                    ${commentPage},
                    ${myPage.commentTotalPages},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage - 1},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage})},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage + 1},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage})}
                )}"></th:block>
            </div>

            <!-- 좋아요한 고민 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">LIKED CONCERNS</div>
                <div class="mypage-list" th:if="${not #lists.isEmpty(myPage.concernLikeDtos)}">
                    <a th:each="item : ${myPage.concernLikeDtos}"
                       th:href="@{/concern/{id}(id=${item.concernId})}"
                       class="mypage-item">
                        <span class="item-title" th:text="${item.concernTitle}"></span>
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(myPage.concernLikeDtos)}" class="mypage-empty">좋아요한 고민이 없습니다</div>
                <th:block th:replace="~{fragments/layout :: mypage-pager(
                    ${concernLikePage},
                    ${myPage.concernLikeTotalPages},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage},concernLikePage=${concernLikePage - 1},commentLikePage=${commentLikePage})},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage},concernLikePage=${concernLikePage + 1},commentLikePage=${commentLikePage})}
                )}"></th:block>
            </div>

            <!-- 좋아요한 댓글 -->
            <div class="mypage-panel">
                <div class="mypage-panel-title">LIKED COMMENTS</div>
                <div class="mypage-list" th:if="${not #lists.isEmpty(myPage.commentLikeDtos)}">
                    <div th:each="item : ${myPage.commentLikeDtos}" class="mypage-item">
                        <span class="item-title" th:text="${item.commentContent}"></span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(myPage.commentLikeDtos)}" class="mypage-empty">좋아요한 댓글이 없습니다</div>
                <th:block th:replace="~{fragments/layout :: mypage-pager(
                    ${commentLikePage},
                    ${myPage.commentLikeTotalPages},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage - 1})},
                    @{/myPage(concernPage=${concernPage},commentPage=${commentPage},concernLikePage=${concernLikePage},commentLikePage=${commentLikePage + 1})}
                )}"></th:block>
            </div>

        </div>
    </div>

    <th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>

</body>
</html>
