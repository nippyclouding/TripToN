<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('고민 정보 확인', '/css/info.css')}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: sound-only}"></th:block>

<div class="container">
    <h1>당신의 고민 정보</h1>
    
    <div class="info-section">
        <h2>당신의 고민은:</h2>
        <p class="concern-title" th:text="${aiResponseDto?.concernTitle}">고민 제목이 여기에 표시됩니다</p>
        <p class="concern-text" th:text="${aiResponseDto?.concernContent}">고민 내용이 여기에 표시됩니다</p>
    </div>

    <div class="info-section">
        <h2>조언:</h2>
        <p class="advice-text" th:text="${aiResponseDto?.responseContent}">AI의 조언이 여기에 표시됩니다</p>
    </div>
    
    <div class="button-section">
        <button type="button" onclick="location.href='/result'" class="next-btn">다음 단계로</button>
    </div>
</div>
<th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>
</body>
</html>
