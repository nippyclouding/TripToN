<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SIGNUP / IN</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body class="signup-background">

    <div th:replace="~{fragments/sidebar :: symbol-logo}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/sound-toggle :: sound-toggle}"></div>

    <div class="signup-container">

        <!-- 탭 버튼 -->
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOG IN</button>
            <span class="tab-divider">/</span>
            <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">SIGN UP</button>
        </div>

        <!-- 로그인 폼 -->
        <div class="form-section" id="section-login">
            <div class="form-group">
                <input type="text" id="login-id" placeholder="ID" class="form-input" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="password" id="login-pw" placeholder="PASSWORD" class="form-input">
            </div>
            <button class="submit-btn" onclick="handleLogin()">LOG IN</button>
        </div>

        <!-- 회원가입 폼 -->
        <div class="form-section hidden" id="section-signup">
            <div class="form-group">
                <input type="text" id="signup-id" placeholder="ID" class="form-input" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="email" id="signup-email" placeholder="EMAIL" class="form-input" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="password" id="signup-pw" placeholder="PASSWORD" class="form-input">
            </div>
            <button class="submit-btn" onclick="handleSignup()">SIGN UP</button>
        </div>

    </div>

    <th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>
    <script src="/js/signup.js"></script>

</body>
</html>
