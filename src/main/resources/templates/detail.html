<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>고민 상세 정보</title>
    <link rel="stylesheet" href="/css/luggage_detail.css">
    <link rel="stylesheet" href="/css/shared.css">
</head>
<body>

    <!-- 배경 이미지 (concern 리스트와 동일) -->
    <div class="background"></div>

    <div th:replace="~{fragments/sidebar :: symbol-logo}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- ===== 잠긴 글 화면 ===== -->
    <div th:if="${!isAccessAllowed}" class="locked-overlay">
        <div class="locked-box">
            <div class="lock-icon">&#128274;</div>
            <h2>잠긴 글입니다</h2>
            <p>작성자만 확인할 수 있는 글입니다.</p>
            <button onclick="history.back()" class="locked-back-btn">돌아가기</button>
        </div>
    </div>

    <!-- ===== 정상 콘텐츠 ===== -->
    <div th:if="${isAccessAllowed}" class="page-content">

        <!-- 중앙: 가방 이미지 -->
        <div class="luggage-center">
            <img th:src="|/image/sharedImage/item${concernDetailResponseDto.luggageType.ordinal() + 1}.png|"
                 th:alt="${concernDetailResponseDto.luggageType}"
                 class="luggage-image"/>
        </div>

        <!-- 좌측 상단: 고민 -->
        <div class="panel concern-panel">
            <div class="panel-header">
                <h3>고민</h3>
                <span th:if="${concernDetailResponseDto.locked}" class="lock-badge">&#128274; 잠김</span>
            </div>
            <div class="panel-meta">
                <span class="nickname" th:text="${concernDetailResponseDto.memberNickName}"></span>
                <span class="date" th:text="${#temporals.format(concernDetailResponseDto.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
            </div>
            <div class="concern-title" th:text="${concernDetailResponseDto.concernTitle}"></div>
            <div class="concern-content" th:text="${concernDetailResponseDto.concernContent}"></div>
        </div>

        <!-- 좌측 하단: AI 답변 -->
        <div class="panel ai-panel">
            <div class="panel-header">
                <h3>가방의 조언</h3>
            </div>
            <div class="ai-content" th:text="${concernDetailResponseDto.responseContent}"></div>
        </div>

        <!-- 우측 상단: 댓글 작성 + 댓글 목록 -->
        <div class="panel comment-panel">
            <div class="panel-header">
                <h3>댓글 작성</h3>
            </div>

            <!-- 로그인한 경우: 댓글 작성 폼 -->
            <div th:if="${loginMemberId != null}">
                <form th:action="@{/concern/{id}/comments(id=${concernId})}" method="post" class="comment-form">
                    <textarea name="commentContent"
                              placeholder="댓글을 입력하세요..."
                              class="comment-textarea"
                              required></textarea>
                    <button type="submit" class="comment-submit-btn">등록</button>
                </form>
            </div>

            <!-- 로그인하지 않은 경우 -->
            <div th:if="${loginMemberId == null}" class="login-required">
                <p>댓글을 작성하려면 로그인이 필요합니다.</p>
                <button onclick="location.href='/'" class="login-btn">로그인하기</button>
            </div>

            <!-- 기존 댓글 목록 -->
            <div th:if="${not #lists.isEmpty(concernDetailResponseDto.dtos)}" class="comments-list">
                <div class="comments-divider">댓글 목록</div>
                <div th:each="comment : ${concernDetailResponseDto.dtos}" class="comment-item">
                    <div class="comment-meta">
                        <strong th:text="${comment.commentMemberNickname}"></strong>
                        <small th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}"></small>
                    </div>
                    <p th:text="${comment.commentContent}"></p>
                </div>
            </div>
        </div>

        <!-- 뒤로가기 버튼 (하단 중앙) -->
        <button onclick="history.back()" class="back-btn">&#8592; 목록으로</button>

    </div>

    <script src="/js/shared.js"></script>
</body>
</html>
