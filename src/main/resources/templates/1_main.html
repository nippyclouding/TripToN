<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Condensed:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/1_main.css">
</head>
<body class="main-background">

    <div th:replace="~{fragments/sidebar :: symbol-logo}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/sound-toggle :: sound-toggle}"></div>

    <!-- flash 메시지가 있으면 sign 모달 자동 오픈 -->
    <th:block th:if="${success != null or fail != null}">
        <script>document.addEventListener('DOMContentLoaded', () => openSignModal());</script>
    </th:block>

    <!-- 하단 중앙 화살표 버튼 -->
    <div class="arrow-button-container">
        <a href="/introduce" class="arrow-btn">
            <img src="/image/1_mainPage/arrow.png" alt="소개 페이지로 이동">
        </a>
    </div>

    <th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>

</body>
</html>
